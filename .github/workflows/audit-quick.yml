# #13: Automated audit — egress-aware scheduling
# Quick audit: 3~4x/week (Mon/Wed/Fri + optional Sat)
# Full audit: biweekly (1st/3rd Sunday) — without analysis
# Analysis: monthly (1st Sunday only)

name: Audit

on:
  schedule:
    # Quick audit: Mon/Wed/Fri 10:30 KST (01:30 UTC)
    - cron: '30 1 * * 1,3,5'
    # Full audit + compare: biweekly Sun 10:00 KST (01:00 UTC)
    # GitHub cron doesn't support biweekly; use day-of-month filter in job
    - cron: '0 1 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Audit mode'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full
          - report
          - compare
          - analysis

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Determine audit mode
        id: mode
        run: |
          DOW=$(date +%u)  # 1=Mon ... 7=Sun
          DOM=$(date +%d)  # day of month

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
            echo "run_compare=false" >> $GITHUB_OUTPUT
            echo "run_analysis=false" >> $GITHUB_OUTPUT
          elif [ "$DOW" = "7" ]; then
            # Sunday: full audit (biweekly — 1st/3rd week = day 1-7, 15-21)
            if [ "$DOM" -le 7 ] || [ "$DOM" -ge 15 -a "$DOM" -le 21 ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
              echo "run_compare=true" >> $GITHUB_OUTPUT
              # Analysis only on 1st Sunday (day 1-7)
              if [ "$DOM" -le 7 ]; then
                echo "run_analysis=true" >> $GITHUB_OUTPUT
              else
                echo "run_analysis=false" >> $GITHUB_OUTPUT
              fi
            else
              # 2nd/4th Sunday: skip (save egress)
              echo "mode=skip" >> $GITHUB_OUTPUT
              echo "run_compare=false" >> $GITHUB_OUTPUT
              echo "run_analysis=false" >> $GITHUB_OUTPUT
            fi
          else
            # Mon/Wed/Fri: quick audit
            echo "mode=quick" >> $GITHUB_OUTPUT
            echo "run_compare=false" >> $GITHUB_OUTPUT
            echo "run_analysis=false" >> $GITHUB_OUTPUT
          fi

      - name: Run audit
        if: steps.mode.outputs.mode != 'skip'
        run: |
          MODE="${{ steps.mode.outputs.mode }}"
          echo "Running audit --${MODE}"
          npx tsx -r dotenv/config server/scripts/audit-all.ts --${MODE}

      - name: Run compare (biweekly full only)
        if: steps.mode.outputs.run_compare == 'true'
        run: npx tsx -r dotenv/config server/scripts/audit-all.ts --compare

      - name: Run analysis (monthly only)
        if: steps.mode.outputs.run_analysis == 'true'
        run: npx tsx -r dotenv/config server/scripts/audit-all.ts --analysis
